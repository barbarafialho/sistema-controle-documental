cors:
  originPatterns: "*"
email:
  subject: "Default Subject"
  message: "Default Message"
spring:
  profiles:
    active: local
  application:
    name: sistema-controle-documental
  datasource:
    url: jdbc:mysql://localhost:3306/sistema_controle_documental
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
spring-doc:
  paths-to-match: /api/**/**
  swagger-ui:
    use-root-path: true
logging:
  level:
    br.com.barbara.sistema_controle_documental: DEBUG